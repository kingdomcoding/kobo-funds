name: kobo-funds-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: kobo-funds-dev-postgres
    environment:
      POSTGRES_USER: kobo
      POSTGRES_PASSWORD: kobo
      POSTGRES_DB: kobo_funds
    ports:
      - '127.0.0.1:55432:5432'
    volumes:
      - kobo-dev-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kobo']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kobo-funds-dev-redis
    ports:
      - '127.0.0.1:56379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  kobo-dev-pg-data:
