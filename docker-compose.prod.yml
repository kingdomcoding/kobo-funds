name: kobo-funds-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: kobo-funds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kobo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: kobo_funds
    volumes:
      - kobo-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kobo']
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kobo-funds-redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kobo-funds-api:latest
    container_name: kobo-funds-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    ports:
      - '127.0.0.1:8081:3000'

volumes:
  kobo-pg-data:
